name: CI

on: [push, pull_request]
permissions: {}

jobs:
  code_quality:
    name: Code Quality
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: false
          cache: true

      # Install required tools
      - uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # v1.20.1
      - run: mise install cargo:dprint cargo:typos-cli #  via binstall

      - name: Quality Check
        env:
          MISE_TASK_RUN_AUTO_INSTALL: false
        run: |
          mise run lint
          mise run test:ci

  build:
    name: Build for ${{ matrix.build }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # prettier-ignore
        include:
          - { build: linux-gnu, os: ubuntu-22.04, target: x86_64-unknown-linux-gnu }
          - { build: linux-musl, os: ubuntu-22.04, target: x86_64-unknown-linux-musl }
          - { build: win-gnu, os: windows-2022, target: x86_64-pc-windows-gnu }
          - { build: win-msvc, os: windows-2022, target: x86_64-pc-windows-msvc }
          - { build: win32-msvc, os: windows-2022, target: i686-pc-windows-msvc }
          - { build: macos, os: macos-15-intel, target: x86_64-apple-darwin }

    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          target: ${{ matrix.target }}

      - name: Show version information
        shell: bash
        run: |
          rustc --version
          cargo --version

      - name: Install dependencies
        shell: bash
        env:
          BUILD: ${{ matrix.build }}
        run: |
          if [[ "$BUILD" == *-musl ]]; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              --allow-unauthenticated musl-tools
          fi

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
