name: Release

on:
  push:
    tags:
      - "v*"

# Deny by default; each job opts into only what it needs.
permissions: {}

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # required for git-cliff
          persist-credentials: false

      - name: Generate a changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        id: git-cliff
        with:
          config: .cliff.toml
          args: -vv --strip header --latest --no-exec --github-repo ${{ github.repository }}

  # Create the GitHub release exactly once, before any assets are uploaded.
  # This is the gated step (environment: release) and the only place the
  # release is created, which avoids the 6-way `gh release create` collision.
  create-release:
    name: Create Release
    runs-on: ubuntu-24.04
    needs: changelog
    permissions:
      contents: write
    environment: release
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set the release version
        shell: bash
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"

      - name: Set pre-release flag
        shell: bash
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          if [[ "$GIT_REF" == *alpha* ]] || [[ "$GIT_REF" == *beta* ]]; then
            echo "PRERELEASE_FLAG=--prerelease" >> "$GITHUB_ENV"
          else
            echo "PRERELEASE_FLAG=" >> "$GITHUB_ENV"
          fi

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG: ${{ needs.changelog.outputs.release_body }}
        run: ./mise/tasks/github-release

  release:
    name: Release ${{ matrix.build }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # prettier-ignore
        include:
          - { build: linux-gnu, os: ubuntu-22.04, target: x86_64-unknown-linux-gnu }
          - { build: linux-musl, os: ubuntu-22.04, target: x86_64-unknown-linux-musl }
          - { build: win-gnu, os: windows-2022, target: x86_64-pc-windows-gnu }
          - { build: win-msvc, os: windows-2022, target: x86_64-pc-windows-msvc }
          - { build: win32-msvc, os: windows-2022, target: i686-pc-windows-msvc }
          - { build: macos, os: macos-15-intel, target: x86_64-apple-darwin }

    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set the release version
        shell: bash
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"

      - name: Install dependencies
        shell: bash
        env:
          BUILD: ${{ matrix.build }}
        run: |
          if [[ "$BUILD" == *-musl ]]; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              --allow-unauthenticated musl-tools
          fi

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          target: ${{ matrix.target }}
          cache: false

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Create archive
        id: package
        shell: bash
        env:
          APP_NAME: ${{ github.event.repository.name }}
          REPO_NAME: ${{ github.event.repository.name }}
          TARGET: ${{ matrix.target }}
        run: ./mise/tasks/package

      - name: Upload release asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG_PATH: ${{ steps.package.outputs.PKG_PATH }}
        run: gh release upload "$RELEASE_VERSION" "$PKG_PATH" --clobber
